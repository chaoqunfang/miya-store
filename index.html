<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miya Store</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f5f5f5;color:#333}
.topbar{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:14px 20px;color:#fff;font-size:20px;font-weight:bold;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.topbar a{color:#25d366;text-decoration:none;font-size:13px;font-weight:normal}
.main{display:flex;min-height:100vh}
.sidebar{width:230px;background:#fff;border-right:1px solid #e0e0e0;position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto;flex-shrink:0}
.sidebar .search{padding:10px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:1}
.sidebar .search input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
.sidebar h3{padding:10px 14px;font-size:12px;color:#888;text-transform:uppercase;cursor:pointer;border-bottom:1px solid #f0f0f0;user-select:none;display:flex;justify-content:space-between;align-items:center}
.sidebar h3:hover{background:#f8f8f8}
.sidebar h3.active{background:#1a1a2e;color:#fff}
.sidebar ul{list-style:none;max-height:0;overflow:hidden;transition:max-height .3s ease}
.sidebar ul.open{max-height:2000px}
.sidebar li{padding:7px 24px;font-size:12px;cursor:pointer;color:#555;border-bottom:1px solid #fafafa}
.sidebar li:hover{background:#f0f4ff;color:#1a1a2e}
.sidebar li.active{background:#e8f0fe;color:#1a73e8;font-weight:bold;border-left:3px solid #1a73e8}
.content{flex:1;padding:20px}
.stats{text-align:center;color:#888;font-size:14px;margin-bottom:16px;padding:10px;background:#fff;border-radius:8px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
.product{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:all .3s;cursor:pointer}
.product:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.product img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#f0f0f0}
.product-title{padding:8px 10px;font-size:12px;color:#333;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:40px;line-height:1.3}
.loading{text-align:center;padding:60px 20px;color:#888;font-size:16px}
.loading .spinner{width:40px;height:40px;border:4px solid #f0f0f0;border-top-color:#1a1a2e;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
.sidebar{display:none}
.topbar{font-size:16px;padding:10px 16px}
.content{padding:10px}
.product-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
}
</style>
</head>
<body>
<div class="topbar">
<div>MIYA STORE</div>
<a href="https://wa.me/8615759948239" target="_blank">WhatsApp Order</a>
</div>
<div class="main">
<aside class="sidebar">
<div class="search"><input type="text" id="search-box" placeholder="Search..." oninput="filterProducts()"></div>
<div id="nav"></div>
</aside>
<div class="content">
<div class="stats" id="stats">Loading products...</div>
<div id="grid"><div class="loading"><div class="spinner"></div>Loading products, please wait...</div></div>
</div>
</div>
<script>
let products=[], cats={};

function buildCats(){
  cats={};
  products.forEach(p=>{
    const big=p.big_category||'Other';
    const sub=p.sub_category||p.category||'General';
    if(!cats[big])cats[big]={};
    if(!cats[big][sub])cats[big][sub]=[];
    cats[big][sub].push(p);
  });
}

function renderNav(){
  const order=Object.keys(cats).sort((a,b)=>Object.values(cats[b]).flat().length-Object.values(cats[a]).flat().length);
  let h='';
  order.forEach(big=>{
    const total=Object.values(cats[big]).flat().length;
    const id='ul-'+big.replace(/[^a-zA-Z0-9]/g,'_');
    h+='<h3 onclick="toggleCat(this,''+id+'')">'+big+' <span style="opacity:.5;font-weight:normal">('+total+')</span><span>▶</span></h3>';
    h+='<ul id="'+id+'">';
    Object.keys(cats[big]).sort((a,b)=>cats[big][b].length-cats[big][a].length).forEach(sub=>{
      h+='<li onclick="event.stopPropagation();showSub(''+big.replace(/'/g,"\'")+'',''+sub.replace(/'/g,"\'")+'')">'+sub+' <span style="opacity:.4">('+cats[big][sub].length+')</span></li>';
    });
    h+='</ul>';
  });
  document.getElementById('nav').innerHTML=h;
}

function toggleCat(el,id){
  const isOpen=el.classList.contains('active');
  document.querySelectorAll('.sidebar h3').forEach(h=>h.classList.remove('active'));
  document.querySelectorAll('.sidebar ul').forEach(u=>u.classList.remove('open'));
  if(!isOpen){el.classList.add('active');document.getElementById(id).classList.add('open');}
}

function showSub(big,sub){
  document.querySelectorAll('.sidebar li').forEach(l=>l.classList.remove('active'));
  event.target.classList.add('active');
  renderGrid(cats[big][sub]);
}

function renderGrid(prods){
  document.getElementById('stats').textContent=prods.length+' products';
  if(!prods.length){document.getElementById('grid').innerHTML='<div class="loading">No products found</div>';return;}
  document.getElementById('grid').innerHTML=prods.map(p=>{
    const t=(p.title||'').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const img=p.image_url||'';
    const wa='https://wa.me/8615759948239?text='+encodeURIComponent('I want: '+(p.title||''));
    return '<div class="product" onclick="window.open(''+wa+'','_blank')"><img src="'+img+'" loading="lazy" alt="'+t+'"><div class="product-title">'+t+'</div></div>';
  }).join('');
}

function filterProducts(){
  const q=document.getElementById('search-box').value.toLowerCase();
  if(!q){document.getElementById('grid').innerHTML='<div class="loading">Select a category</div>';document.getElementById('stats').textContent='';return;}
  renderGrid(products.filter(p=>(p.title||'').toLowerCase().includes(q)));
}

// Load products.json
fetch('products.json')
  .then(r=>r.json())
  .then(data=>{
    products=data;
    buildCats();
    renderNav();
    document.getElementById('stats').textContent='Click a category to browse - '+products.length+' products';
    document.getElementById('grid').innerHTML='<div class="loading">Select a category from the left</div>';
  })
  .catch(e=>{
    document.getElementById('grid').innerHTML='<div class="loading">Error loading products: '+e.message+'</div>';
  });
</script>
</body>
</html>
